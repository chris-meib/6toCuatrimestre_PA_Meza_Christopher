<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>examen to-do liat</title>
</head>
<body>
     <main class="app">

    <header class="app__header">
      <h1 class="app__title">To-Do List pro max 1.0</h1>
      <p class="app__counter"><span id="counter">0</span> tareas pendientes</p>
    </header>

    <section class="app__input">
      <input
        type="text"
        id="taskInput"
        placeholder="Escribe una nueva tarea..."
        maxlength="255"
        autocomplete="off"
      />
   <button id="addBtn" onclick="agregarTarea()">Agregar</button>
    </section>

    <nav class="app__filters">
      <button class="filter-btn active" data-filter="todas" onclick="cambiarFiltro('todas')">Todas</button>
     <button class="filter-btn" data-filter="pendientes" onclick="cambiarFiltro('pendientes')">Pendientes</button>
     <button class="filter-btn" data-filter="completadas" onclick="cambiarFiltro('completadas')">Completadas</button>
    </nav>

    <section class="app__list">
      <ul id="taskList"></ul>
      <p id="emptyState" class="empty-state">No hay tareas por aquí.</p>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
